# CoDriver App - AI Track Driving Coach

name: codriver
description: AI Track Driving Coach - Real-time lap analysis and coaching
version: 0.1.0

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  dio: ^5.4.0
  sqflite: ^2.3.0
  fl_chart: ^0.68.0
  flutter_map: ^6.1.0
  amap_flutter_map: ^3.0.0   # China map backup (GCJ-02)
  latlong2: ^0.9.0
  ffi: ^2.1.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  freezed: ^2.5.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
